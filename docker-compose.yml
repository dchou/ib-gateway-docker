version: '3.8'

services:
  ib-gateway:
    image: manhinhang/ib-gateway-docker:latest
    container_name: ib-gateway
    restart: unless-stopped
    ports:
      - "127.0.0.1:4002:4002"   # Paper trading port
      # - "127.0.0.1:4001:4001" # Uncomment for live trading
      # "127.0.0.1:5050:5000"   # Web API HTTPS (primary)
      # "127.0.0.1:5051:5001"   # Web API HTTPS (backup)
    environment:
      - IB_ACCOUNT=${IB_ACCOUNT}
      - IB_PASSWORD=${IB_PASSWORD}
      - TRADING_MODE=${TRADING_MODE}
      - HEALTHCHECK_API_ENABLE=true
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/healthcheck"]
      interval: 60s
      timeout: 30s
      retries: 3
      start_period: 60s

